<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harry's Portfolio</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0f2c;
            color: white;
            font-family: 'Roboto', sans-serif;
            height: 100vh;
        }

        header {
            background-color: #1a2338;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 600;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 35px;
        }

        nav ul li {
            cursor: pointer;
            font-size: 1.05rem;
            transition: color 0.3s;
        }

        nav ul li:hover {
            color: #ff4d4d;
        }

        .main-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 80px 8%;
            height: calc(100vh - 70px);
        }

        .left-bar {
            background-color: #ff0000;
            color: white;
            padding: 20px 40px;
            font-size: 1.3rem;
            font-weight: 500;
            width: 45%;
        }

        .right-bar {
            background-color: #ff0000;
            color: white;
            padding: 20px 40px;
            font-size: 1.3rem;
            font-weight: 500;
            width: 45%;
            text-align: right;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Harry's Portfolio</div>
        <nav>
            <ul>
                <li>Home</li>
                <li>About</li>
                <li>Services</li>
                <li>Projects</li>
                <li>Contact Me</li>
            </ul>
        </nav>
    </header>

    <div class="main-content">
        <div class="left-bar">left</div>
        <div class="right-bar">right</div>
    </div>
</body>
</html>
